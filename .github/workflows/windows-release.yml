name: Build Windows Installer

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish App
      run: |
        dotnet publish BitConverter.UI/BitConverter.UI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o ./publish

    # Завантажуємо портативний офіційний компилятор Inno Setup безпосередньо, без choco
    - name: Download Inno Setup Portable
      run: |
        curl -L -o innosetup.zip https://files.jrsoftware.org/is/6/is-6.2.2-unicode.zip
        Expand-Archive -Path innosetup.zip -DestinationPath .\iscc

    - name: Build Installer EXE
      run: |
        New-Item -Path . -Name "setup.iss" -ItemType "file" -Value @"
        [Setup]
        AppName=BitConverter
        AppVersion=3.0.0
        DefaultDirName={autopf}\BitConverter
        DefaultGroupName=BitConverter
        OutputDir=.\installer
        OutputBaseFilename=BitConverterSetup
        Compression=lzma
        SolidCompression=yes
        DisableProgramGroupPage=yes

        [Files]
        Source: ".\publish\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

        [Icons]
        Name: "{group}\BitConverter"; Filename: "{app}\BitConverter.exe"
        Name: "{commondesktops}\BitConverter"; Filename: "{app}\BitConverter.exe"
        "@
        # Викликаємо завантажений портативний компилятор
        .\iscc\ISCC.exe setup.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BitConverterSetup-Windows
        path: ./installer/BitConverterSetup.exe
